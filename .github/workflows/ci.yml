name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Format
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Test
        run: make test
